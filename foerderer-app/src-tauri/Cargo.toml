[package]
name = "antrag3000-foerderer"
version = "0.1.0"
description = "Antrag 3000 – Förderer-App"
authors = ["Antrag 3000 Team"]
license = "GPL-3.0-or-later"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Bewusst minimal gehalten: nur das Nötige für ein leeres, lauffähiges
# Tauri-Grundgerüst. Weitere Abhängigkeiten kommen erst, wenn echte
# Funktionen gebaut werden.
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
strip = true
