[package]
name = "antrag3000-foerderer"
version = "0.1.0"
description = "Antrag 3000 – Förderer-App"
authors = ["Antrag 3000 Team"]
license = "GPL-3.0-or-later"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Bewusst schlank gehalten.
tauri = { version = "2", features = [] }
# Datei-Dialog ("Speichern unter") fuer den Foerderer-Export (Weg A: Datei).
# Gleiche Abhaengigkeit wie in der Admin-App.
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Signatur-Herkunft: signiert jeden Export mit dem Foerderer-Schluessel
# (ECDSA P-256, RustCrypto) -> jede Foerderung ist dem Foerderer zuordenbar.
p256 = { version = "0.13", features = ["ecdsa", "pem", "pkcs8"] }
base64 = "0.22"

[profile.release]
opt-level = "z"
lto = true
strip = true
