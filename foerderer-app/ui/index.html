<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Antrag 3000 – Förderer</title>
  <style>
    :root { --gold:#f5a623; --gold-d:#d98c0f; --rand:#dfe1e6; --grau:#5e6c84; --dunkel:#172b4d; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", system-ui, Arial, sans-serif;
      color: var(--dunkel); background: #f4f5f7; font-size: 14px;
    }
    header {
      background: #fff; border-bottom: 1px solid var(--rand);
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    }
    header img { height: 28px; width: 28px; display: block; }
    header h1 { font-size: 1.05rem; margin: 0; }
    main { padding: 48px 20px; max-width: 720px; margin: 0 auto; text-align: center; }
    .karte {
      background: #fff; border: 1px solid var(--rand); border-radius: 12px;
      padding: 44px 28px;
    }
    .karte img { width: 96px; height: 96px; }
    h2 { margin: 20px 0 8px; font-size: 1.2rem; }
    p { color: var(--grau); margin: 6px 0; }
    .tag { display:inline-block; margin-top:14px; padding:4px 12px; border-radius:999px;
      background:#fff7e9; color:var(--gold-d); border:1px solid var(--gold);
      font-size:0.8rem; font-weight:600; }
  </style>
</head>
<body>
  <header>
    <img src="icon.svg" alt="" />
    <h1>Antrag 3000 – Förderer</h1>
  </header>
  <main>
    <div class="karte">
      <img src="icon.svg" alt="Förderer-App" />
      <h2>Förderer-App</h2>
      <p>Grundgerüst – lauffähiges, noch leeres Fenster.</p>
      <p>Die Funktionen folgen in den nächsten Schritten.</p>
      <span class="tag">Version 0.1.0</span>
    </div>
  </main>
</body>
</html>
