# Variante "Tailscale" (kostenlos, keine offenen Router-Ports).
#
# Die NAS ist im privaten Tailnet erreichbar (Tailscale-Paket auf der
# Synology). Caddy macht HTTPS + mTLS mit DEINER Team-CA und einem
# selbst signierten Server-Zertifikat (in der App erzeugt: server.crt /
# server.key). Cloudflare/Let's Encrypt sind NICHT beteiligt.
#
# Vorher in den Ordner legen:
#   ./ca/team-ca.crt   (Team-CA-Zertifikat aus der App)
#   ./server.crt       (NAS-Server-Zertifikat aus der App)
#   ./server.key       (zugehoeriger Schluessel aus der App)
#   ./katalog/foerderungen.json
#   ./katalog/rohquelle.json   (optional, fuer den woechentlichen Sammler;
#                               erzeugt mit: node import/rohquelle-bauen.mjs)
#
# Start (im server/-Ordner):
#   docker compose -f docker-compose.tailscale.yml up -d --build
#
# Woechentlicher Sammler-Lauf (legt Freigabe-Vorschlaege an, nichts wird
# automatisch veroeffentlicht) – einmalig von Hand oder per Aufgabenplaner:
#   sh sammler-cron.sh
#   bzw. direkt:
#   docker compose -f docker-compose.tailscale.yml run --rm api sammeln /srv/rohquelle.json

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    # Host-Port 8443 statt 443: Auf der Synology belegt DSM selbst den
    # Port 443. Die App spricht die NAS daher unter ...:8443 an.
    ports:
      - "8443:443"
    volumes:
      - ./Caddyfile.tailscale:/etc/caddy/Caddyfile:ro
      - ./ca/team-ca.crt:/etc/caddy/ca/team-ca.crt:ro
      - ./server.crt:/etc/caddy/server.crt:ro
      - ./server.key:/etc/caddy/server.key:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - intern
    depends_on:
      - api

  api:
    build: ./api
    restart: unless-stopped
    # Der frische Daten-Ordner (Volume) gehoert auf der NAS root; damit der
    # Dienst die SQLite-Datei anlegen darf, laeuft er als root. Die uebrige
    # Haertung bleibt (keine Capabilities, keine Rechte-Eskalation,
    # read-only Dateisystem; nur /data und /tmp sind beschreibbar).
    user: "0:0"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      - DB_PFAD=/data/antrag3000.sqlite
      - LAUSCH=0.0.0.0:8080
      - KATALOG_PFAD=/srv/foerderungen.json
      # Admin-Zugang (Etappe 4): TOTP-Geheimnis fuer die Authenticator-App.
      # Erzeugen mit
      #   docker compose -f docker-compose.tailscale.yml run --rm api totp
      # Das ausgegebene ADMIN_TOTP_SECRET in server/.env eintragen und die
      # otpauth://-URL EINMAL mit einer Authenticator-App scannen.
      # Leer = Admin-Zugang deaktiviert.
      - ADMIN_TOTP_SECRET=${ADMIN_TOTP_SECRET:-}
    volumes:
      - api_data:/data
      - ./katalog:/srv:ro
    networks:
      - intern
    # KEIN "ports:" – nur intern, über Caddy.

networks:
  intern:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  api_data:
