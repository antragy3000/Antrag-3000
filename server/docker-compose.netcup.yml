# Variante "Netcup-VPS" (öffentlich erreichbar, kein Tailscale).
#
# Vorher in den server/-Ordner legen (nicht versioniert – siehe .gitignore):
#   ./ca/team-ca.crt   (Team-CA-Zertifikat aus der App)
#   ./server.crt       (Server-Zertifikat aus der App, SAN team.antrag3000.de)
#   ./server.key       (zugehöriger Schlüssel)
#   ./katalog/foerderungen.json
#   ./.env             (SYNC_DOMAIN, ACME_EMAIL, ADMIN_TOTP_SECRET)
#
# Start (im server/-Ordner):
#   docker compose -f docker-compose.netcup.yml up -d --build
# Nur den Dienst neu bauen (nach Code-Update per git pull):
#   docker compose -f docker-compose.netcup.yml up -d --build api
#
# Update auf Schritt 2 (Service-CA) OHNE den laufenden Sync zu brechen –
# Reihenfolge einhalten, weil Caddy das service-ca.crt mountet:
#   1) git pull
#   2) docker compose -f docker-compose.netcup.yml up -d --build api
#      -> die api erzeugt ./service-ca/service-ca.crt (+ .key). Caddy läuft
#         noch mit der alten Konfiguration weiter, Sync unverändert.
#   3) ls -l ./service-ca/service-ca.crt   (muss existieren!)
#   4) docker compose -f docker-compose.netcup.yml up -d
#      -> Caddy übernimmt den Dual-Trust (Team-CA + Service-CA). Bestehende
#         Geräte (Team-CA) bleiben gültig.

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"      # Let's-Encrypt-Prüfung
      - "443:443"    # öffentlicher Pfad (Updates/Katalog/Logos)
      - "8443:8443"  # Team-Sync (mTLS)
    environment:
      - SYNC_DOMAIN=${SYNC_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile.netcup:/etc/caddy/Caddyfile:ro
      - ./ca/team-ca.crt:/etc/caddy/ca/team-ca.crt:ro
      # Öffentliche CA-Zertifikate (erzeugt die api ins ./service-ca-Volume).
      # Nur lesend – die geheimen Schlüssel werden NIE gemountet.
      - ./service-ca/service-ca.crt:/etc/caddy/ca/service-ca.crt:ro
      - ./service-ca/foerderer-ca.crt:/etc/caddy/ca/foerderer-ca.crt:ro
      - ./server.crt:/etc/caddy/server.crt:ro
      - ./server.key:/etc/caddy/server.key:ro
      - ./updates:/srv/updates:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - intern
    depends_on:
      - api

  api:
    build: ./api
    restart: unless-stopped
    # Härtung: keine Capabilities, keine Rechte-Eskalation, read-only
    # Dateisystem; nur /data (Volume) und /tmp sind beschreibbar.
    user: "0:0"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      - DB_PFAD=/data/antrag3000.sqlite
      - LAUSCH=0.0.0.0:8080
      - KATALOG_PFAD=/srv/foerderungen.json
      - CERT_HEADER_MODE=caddy
      - ADMIN_TOTP_SECRET=${ADMIN_TOTP_SECRET:-}
      # Ordner der Service-CA (gehostetes Modell, Schritt 2). Die api erzeugt
      # dort service-ca.crt (öffentlich, von Caddy gemountet) + service-ca.key
      # (geheim, bleibt im Volume).
      - SERVICE_CA_DIR=/service-ca
      # Abo-Gating (Schritt 5) ist gebaut, aber standardmäßig AUS – kein
      # sichtbares Abo. Erst wenn das Abo-Modell starten soll, hier scharf
      # schalten (dann braucht ein Konto ab dem 2. Gerät ein gültiges Abo):
      # - ABO_GATING=1
    volumes:
      - api_data:/data
      - ./katalog:/srv:ro
      # Beschreibbares Host-Volume für die Service-CA (trotz read_only-Container
      # beschreibbar, weil eigener Bind-Mount). Enthält den GEHEIMEN CA-Schlüssel
      # – Ordnerrechte auf dem Host eng halten (z. B. chmod 700 ./service-ca).
      - ./service-ca:/service-ca
    networks:
      - intern
    # KEIN "ports:" – nur intern, über Caddy erreichbar.

networks:
  intern:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  api_data:
